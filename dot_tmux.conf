# ===== Vi mode for copy-mode =====
setw -g mode-keys vi

# ===== Pane navigation with hjkl (vim-style) =====
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ===== Resize panes with HJKL =====
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ===== More intuitive pane splitting =====
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ===== New window in the same directory =====
bind c new-window -c "#{pane_current_path}"

# ===== Vim-style copy mode (selection and yank) =====
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Enter copy-mode with prefix + Escape (feels more vim-like)
bind Escape copy-mode

# ===== Quality of life =====
set -g mouse on                  # enable mouse for scrolling/selection too
set -g base-index 1              # windows start at 1, not 0
setw -g pane-base-index 1
set -sg escape-time 0            # no delay on Esc (important for vim users)
set -g history-limit 10000
set -g renumber-windows on

# Quickly reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
